<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKAZ | Discord Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="auth-screen" class="full-center">
        <div class="auth-card">
            <h2 id="auth-title">Welcome back!</h2>
            <p id="auth-msg">We're so excited to see you again!</p>
            
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="email-input">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="pass-input">
            </div>
            
            <button id="email-btn" class="main-btn">Log In</button>
            <p class="auth-toggle">Need an account? <span id="toggle-mode" style="color: #00a8fc; cursor: pointer;">Register</span></p>
            
            <div class="divider"><span>OR</span></div>
            
            <button id="google-btn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <h3>User Settings</h3>
            <div class="input-group">
                <label>DISPLAY NAME</label>
                <input type="text" id="edit-display-name">
            </div>
            <div class="input-group">
                <label>PROFILE PICTURE URL</label>
                <input type="text" id="edit-photo-url">
            </div>
            <button id="save-profile-btn" class="main-btn">Save Changes</button>
            <button id="logout-btn-real" class="main-btn" style="background: #da373c; margin-top: 10px;">Log Out</button>
            <button id="close-settings-btn" class="main-btn secondary" style="margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <div id="add-server-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <h3>Create a Server</h3>
            <div class="input-group"><input type="text" id="new-server-name" placeholder="Server Name"></div>
            <button id="create-server-btn" class="main-btn">Create</button>
            <button id="close-server-modal" class="main-btn secondary">Close</button>
        </div>
    </div>

    <div id="app" style="display: none;">
        <nav class="server-sidebar">
            <div class="server-icon active" id="home-btn">💬</div>
            <div id="server-list"></div>
            <div class="server-icon add-btn" id="add-server-trigger">+</div>
        </nav>

        <aside class="nav-sidebar">
            <header class="sidebar-header"><span id="sidebar-name">Direct Messages</span></header>
            <div id="nav-content" class="nav-items"></div>
            <footer class="user-footer">
                <img id="user-img" src="" alt="" onerror="this.src='https://via.placeholder.com/32'">
                <div class="user-meta">
                    <span id="user-name">User</span>
                    <span id="user-tag">#0000</span>
                </div>
                <button id="open-settings-btn">⚙️</button>
            </footer>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <span class="hash">#</span>
                <h3 id="target-name">friends</h3>
            </header>
            <div id="messages-container"></div>
            <div class="input-wrap">
                <div class="input-box">
                    <input type="text" id="chat-input" placeholder="Message...">
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
