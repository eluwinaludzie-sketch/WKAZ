<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKAZ | Discord Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="auth-screen" class="full-center">
        <div class="auth-card">
            <h2>Welcome back!</h2>
            <p id="auth-msg">We're so excited to see you again!</p>
            
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="email-input">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="pass-input">
            </div>
            
            <button id="email-btn" class="main-btn">Log In</button>
            <p class="auth-toggle">Need an account? <span id="toggle-mode">Register</span></p>
            
            <div class="divider"><span>OR</span></div>
            
            <button id="google-btn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" alt="">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="app" style="display: none;">
        <nav class="server-sidebar">
            <div class="server-icon active" id="home-btn">💬</div>
            <div class="server-sep"></div>
            <div id="server-list"></div>
            <div class="server-icon add-btn" id="add-server-trigger">+</div>
        </nav>

        <aside class="nav-sidebar">
            <header class="sidebar-header">
                <span id="sidebar-name">Direct Messages</span>
            </header>
            <div id="nav-content" class="nav-items">
                </div>
            <footer class="user-footer">
                <img id="user-img" src="" alt="">
                <div class="user-meta">
                    <span id="user-name">Username</span>
                    <span id="user-tag">#0000</span>
                </div>
                <button id="logout-btn">⚙️</button>
            </footer>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <span class="hash">#</span>
                <h3 id="target-name">general</h3>
            </header>
            <div id="messages-container"></div>
            <div class="input-wrap">
                <div class="input-box">
                    <button class="attach-btn">+</button>
                    <input type="text" id="chat-input" placeholder="Message...">
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
